<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studie-app — Jaar 2 naar Jaar 3</title>
  <link rel="stylesheet" href="stijl.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <h1>📚 Studie-app Jaar 2 → 3</h1>
    <p>Oefen alles wat je nodig hebt om over te gaan naar klas 3. Kies een vak en begin!</p>
  </header>

  <!-- ===== OVERALL PROGRESS ===== -->
  <div class="overall-progress">
    <div class="overall-progress-inner">
      <span class="overall-progress-label">Totale voortgang</span>
      <div class="bar-wrap">
        <div class="bar-fill" id="overallBar" style="width: 0%"></div>
      </div>
      <span class="overall-pct" id="overallPct">0%</span>
    </div>
  </div>

  <!-- ===== SUBJECT GRID ===== -->
  <main class="grid-section">
    <p class="section-title">Vakken</p>
    <div class="subjects-grid" id="subjectsGrid">
      <!-- Cards injected by JS -->
    </div>
  </main>

  <footer>
    <p>Voortgang wordt automatisch opgeslagen in je browser.</p>
    <button class="reset-all-btn" onclick="resetAll()">↺ Reset alle voortgang</button>
  </footer>

  <script>
    /**
     * SUBJECTS CONFIGURATION
     * ----------------------
     * Each entry defines:
     *   id       – used as localStorage key and filename (e.g. wiskunde.html)
     *   label    – Dutch display name
     *   sublabel – short description / curriculum area
     *   icon     – emoji icon
     *   accent   – CSS colour for the card stripe
     *   ready    – true = link is active; false = "binnenkort"
     *
     * Phases per subject are stored in localStorage as:
     *   studie_<id>_phase1, studie_<id>_phase2, studie_<id>_phase3
     * Each value is "done" when completed.
     */
    const SUBJECTS = [
      {
        id: 'wiskunde',
        label: 'Wiskunde',
        sublabel: 'Getallen, algebra, meetkunde',
        icon: '📐',
        accent: '#4361ee',
        ready: true,
      },
      {
        id: 'nederlands',
        label: 'Nederlands',
        sublabel: 'Taal, lezen & schrijven',
        icon: '📖',
        accent: '#e63946',
        ready: false,
      },
      {
        id: 'engels',
        label: 'Engels',
        sublabel: 'Lezen, luisteren & spreken',
        icon: '🇬🇧',
        accent: '#2ec4b6',
        ready: false,
      },
      {
        id: 'duits',
        label: 'Duits',
        sublabel: 'Tweede moderne taal',
        icon: '🇩🇪',
        accent: '#ff9f1c',
        ready: false,
      },
      {
        id: 'geschiedenis',
        label: 'Geschiedenis',
        sublabel: 'Mens en Maatschappij',
        icon: '🏛️',
        accent: '#8b5cf6',
        ready: false,
      },
      {
        id: 'aardrijkskunde',
        label: 'Aardrijkskunde',
        sublabel: 'Mens en Maatschappij',
        icon: '🌍',
        accent: '#10b981',
        ready: false,
      },
      {
        id: 'biologie',
        label: 'Biologie',
        sublabel: 'Mens en Natuur',
        icon: '🧬',
        accent: '#22c55e',
        ready: false,
      },
      {
        id: 'natuurkunde',
        label: 'Natuurkunde',
        sublabel: 'NaSk — Mens en Natuur',
        icon: '⚡',
        accent: '#f59e0b',
        ready: false,
      },
      {
        id: 'scheikunde',
        label: 'Scheikunde',
        sublabel: 'NaSk — Mens en Natuur',
        icon: '🧪',
        accent: '#06b6d4',
        ready: false,
      },
      {
        id: 'economie',
        label: 'Economie',
        sublabel: 'Mens en Maatschappij',
        icon: '💹',
        accent: '#84cc16',
        ready: false,
      },
      {
        id: 'kunst',
        label: 'Beeldende Vorming',
        sublabel: 'Kunst en Cultuur',
        icon: '🎨',
        accent: '#ec4899',
        ready: false,
      },
    ];

    // Phase labels shown inside each card
    const PHASE_LABELS = ['Theorie', 'Oefenen', 'Toets'];

    /**
     * Read completed phases for a subject from localStorage.
     * Returns an array of booleans, e.g. [true, true, false]
     */
    function getProgress(subjectId) {
      return [1, 2, 3].map(n =>
        localStorage.getItem(`studie_${subjectId}_phase${n}`) === 'done'
      );
    }

    /**
     * Build and render all subject cards into the grid.
     */
    function renderCards() {
      const grid = document.getElementById('subjectsGrid');
      grid.innerHTML = '';

      SUBJECTS.forEach(subject => {
        const phases = getProgress(subject.id);
        const doneCount = phases.filter(Boolean).length;
        const pct = Math.round((doneCount / 3) * 100);

        // Build phase dots HTML
        const dotsHtml = phases.map((done, i) => `
          <div class="phase-dot">
            <span class="dot ${done ? 'done' : ''}"></span>
            ${PHASE_LABELS[i]}
          </div>
        `).join('');

        const card = document.createElement(subject.ready ? 'a' : 'div');
        card.className = 'subject-card' + (subject.ready ? '' : ' coming-soon');

        if (subject.ready) {
          card.href = `${subject.id}.html`;
        }

        card.style.setProperty('--accent', subject.accent);

        card.innerHTML = `
          ${!subject.ready ? '<span class="coming-soon-badge">Binnenkort</span>' : ''}
          <div class="card-top">
            <span class="subject-icon">${subject.icon}</span>
            <div class="subject-info">
              <h2>${subject.label}</h2>
              <p class="sub-label">${subject.sublabel}</p>
            </div>
          </div>
          <div class="phase-dots">${dotsHtml}</div>
          <div class="card-progress-bar">
            <div class="card-progress-fill" style="width: ${pct}%"></div>
          </div>
        `;

        grid.appendChild(card);
      });
    }

    /**
     * Calculate and display the overall completion percentage.
     */
    function renderOverallProgress() {
      const totalPhases = SUBJECTS.length * 3;
      let donePhases = 0;

      SUBJECTS.forEach(subject => {
        donePhases += getProgress(subject.id).filter(Boolean).length;
      });

      const pct = Math.round((donePhases / totalPhases) * 100);

      document.getElementById('overallBar').style.width = pct + '%';
      document.getElementById('overallPct').textContent = pct + '%';
    }

    // ===== RESET ALL =====
    function resetAll() {
      if (!confirm('Weet je zeker dat je de voortgang van ALLE vakken wilt wissen?')) return;
      SUBJECTS.forEach(subject => {
        [1, 2, 3].forEach(n => localStorage.removeItem(`studie_${subject.id}_phase${n}`));
      });
      renderCards();
      renderOverallProgress();
    }

    // ===== INIT =====
    renderCards();
    renderOverallProgress();
  </script>
</body>
</html>
