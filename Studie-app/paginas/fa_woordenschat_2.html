<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Frans Woordenschat – Chapitre 2</title>
  <link rel="stylesheet" href="stijl.css" />
  <style>
    .ws-flash-card{text-align:center;padding:24px 16px}
    .ws-flash-word{font-size:2rem;font-weight:800;margin:12px 0 20px;color:#4361ee}
    .ws-counter{font-size:.85rem;color:#888;margin-bottom:8px}
    .ws-input-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
    .ws-score-end{text-align:center;padding:16px}
    .ws-koppel-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .koppel-btn{width:100%;padding:10px 8px;font-size:.85rem;border:2px solid #dde;border-radius:8px;background:#fff;cursor:pointer;transition:background .15s,border-color .15s}
    .koppel-btn:hover:not(:disabled){border-color:#4361ee;background:#eff3ff}
    .koppel-btn.selected{border-color:#4361ee;background:#eff3ff;font-weight:700}
    .koppel-btn.matched{border-color:#2ec4b6;background:#e6faf8;color:#065f46;cursor:default}
    .koppel-btn.wrong-flash{border-color:#e63946;background:#fdecea}
    .ws-mode-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0}
    .ws-mode-btn{padding:7px 16px;border:2px solid #dde;border-radius:999px;background:#fff;cursor:pointer;font-size:.85rem;transition:background .15s}
    .ws-mode-btn.active{background:#4361ee;color:#fff;border-color:#4361ee}
    .ws-theme-bar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:8px 0}
    .ws-theme-btn{padding:5px 12px;border:2px solid #dde;border-radius:999px;background:#fff;cursor:pointer;font-size:.8rem}
    .ws-theme-btn.active{background:#2ec4b6;color:#fff;border-color:#2ec4b6}
    .lijst-table{width:100%;border-collapse:collapse;font-size:.9rem}
    .lijst-table th{background:#4361ee;color:#fff;padding:8px;text-align:left}
    .lijst-table td{padding:7px 8px;border-bottom:1px solid #eee}
    .lijst-table tr:nth-child(even) td{background:#f8f9ff}
    .lijst-sectie{font-weight:700;color:#4361ee;padding:10px 8px 4px;font-size:.85rem}
  </style>
</head>
<body>

  <div class="topbar">
    <a href="fa_woordenschat.html" class="back-btn">← Terug</a>
    <div class="topbar-title">
      <span class="icon">🇫🇷</span>
      <h1>Woordenschat – Chapitre 2</h1>
    </div>
  </div>

  <div class="menu-wrap">

    <div class="ws-theme-bar">
      <button type="button" class="ws-theme-btn active" onclick="selTheme(-1,this)">Alles (54)</button>
      <button type="button" class="ws-theme-btn" onclick="selTheme(0,this)">L'heure &amp; temps</button>
      <button type="button" class="ws-theme-btn" onclick="selTheme(1,this)">Fréquence</button>
      <button type="button" class="ws-theme-btn" onclick="selTheme(2,this)">La journée</button>
      <button type="button" class="ws-theme-btn" onclick="selTheme(3,this)">Repas &amp; loisirs</button>
    </div>

    <div class="ws-mode-bar">
      <button type="button" class="ws-mode-btn" id="btn-fa" onclick="startMode('fa')">Fa → Ne</button>
      <button type="button" class="ws-mode-btn" id="btn-ne" onclick="startMode('ne')">Ne → Fa</button>
      <button type="button" class="ws-mode-btn" id="btn-kp" onclick="startMode('kp')">Koppelen</button>
      <button type="button" class="ws-mode-btn" id="btn-ls" onclick="startMode('ls')">Woordenlijst</button>
    </div>

    <div id="exercise"></div>

  </div>

  <script>
  const THEMES = [
    { name:"L'heure & temps", words:[
      {f:'le matin',n:"'s ochtends"},{f:"l'après-midi",n:"'s middags"},{f:'le soir',n:"'s avonds"},
      {f:'la nuit',n:'de nacht'},{f:'midi',n:'het middaguur'},{f:'minuit',n:'middernacht'},
      {f:"l'heure",n:'het uur'},{f:'tôt',n:'vroeg'},{f:'tard',n:'laat'},
      {f:"aujourd'hui",n:'vandaag'},{f:'demain',n:'morgen'},{f:'hier',n:'gisteren'},
      {f:'la semaine',n:'de week'},{f:'le weekend',n:'het weekend'},{f:'maintenant',n:'nu'},
      {f:'le jour',n:'de dag'},{f:'le mois',n:'de maand'}
    ]},
    { name:'Fréquence', words:[
      {f:'souvent',n:'vaak'},{f:'toujours',n:'altijd'},{f:'jamais',n:'nooit'},
      {f:'parfois',n:'soms'},{f:'rarement',n:'zelden'},{f:'quelquefois',n:'soms/een keer'},
      {f:"d'habitude",n:'gewoonlijk'},{f:'de temps en temps',n:'van tijd tot tijd'},
      {f:'tous les jours',n:'elke dag'},{f:'une fois par semaine',n:'één keer per week'}
    ]},
    { name:'La journée', words:[
      {f:'se lever',n:'opstaan'},{f:'se coucher',n:'gaan slapen'},{f:"s'habiller",n:'zich aankleden'},
      {f:'se laver',n:'zich wassen'},{f:'aller à l\'école',n:'naar school gaan'},{f:'rentrer',n:'terugkomen/naar huis gaan'},
      {f:'faire les devoirs',n:'huiswerk maken'},{f:'dormir',n:'slapen'},{f:'se reposer',n:'rusten'},
      {f:'commencer',n:'beginnen'},{f:'terminer',n:'beëindigen/eindigen'},{f:'partir',n:'vertrekken'},
      {f:'arriver',n:'aankomen'},{f:'travailler',n:'werken'}
    ]},
    { name:'Repas & loisirs', words:[
      {f:'le petit-déjeuner',n:'het ontbijt'},{f:'le déjeuner',n:'de lunch'},{f:'le dîner',n:'het avondeten'},
      {f:'manger',n:'eten'},{f:'boire',n:'drinken'},{f:'le pain',n:'het brood'},
      {f:'le café',n:'de koffie'},{f:'le jus',n:'het sap'},{f:'les céréales',n:'de cornflakes/granen'},
      {f:'jouer',n:'spelen'},{f:'regarder',n:'kijken'},{f:'écouter',n:'luisteren'},
      {f:'lire',n:'lezen'},{f:'faire du sport',n:'sporten'}
    ]}
  ];

  let themeIdx=-1, mode=null, deck=[], idx=0, score=0, checked=false;
  let kRound=[], kSelFr=null, kMatched=0;

  function getWords(){return themeIdx===-1?THEMES.flatMap(t=>t.words):THEMES[themeIdx].words;}

  function selTheme(i,btn){
    themeIdx=i;
    document.querySelectorAll('.ws-theme-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.ws-mode-btn').forEach(b=>b.classList.remove('active'));
    mode=null;
    document.getElementById('exercise').innerHTML='';
  }

  function startMode(m){
    mode=m;
    document.querySelectorAll('.ws-mode-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('btn-'+m).classList.add('active');
    if(m==='kp')startKoppel();
    else if(m==='ls')showLijst();
    else startFlash();
  }

  function shuffle(a){return [...a].sort(()=>Math.random()-.5);}
  function normalize(s){return s.trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ');}

  function startFlash(){deck=shuffle(getWords());idx=0;score=0;showCard();}

  function showCard(){
    checked=false;
    const w=deck[idx];
    const q=mode==='fa'?w.f:w.n;
    document.getElementById('exercise').innerHTML=`
      <div class="kaart ws-flash-card">
        <p class="ws-counter">Woord ${idx+1} van ${deck.length}</p>
        <p class="ws-flash-word">${q}</p>
        <div class="ws-input-row">
          <input type="text" class="ex-input" id="ws-inp" placeholder="${mode==='fa'?'Nederlands':'Frans'}" onkeydown="if(event.key==='Enter')wsCheck()">
          <button type="button" class="check-btn" onclick="wsCheck()">Controleer</button>
        </div>
        <div id="ws-fb" style="margin-top:10px"></div>
        <div style="margin-top:12px">
          <button type="button" class="retry-btn" id="ws-next" onclick="wsNext()" hidden>Volgende →</button>
        </div>
      </div>`;
    document.getElementById('ws-inp').focus();
  }

  function wsCheck(){
    if(checked)return;
    const w=deck[idx];
    const inp=document.getElementById('ws-inp');
    const correct=mode==='fa'?w.n:w.f;
    const ok=normalize(inp.value)===normalize(correct);
    checked=true;if(ok)score++;
    inp.className='ex-input '+(ok?'correct':'wrong');inp.disabled=true;
    const fb=document.getElementById('ws-fb');
    fb.className=ok?'feedback-goed':'feedback-fout';
    fb.textContent=ok?`${w.f} = ${w.n}`:`Juist: ${correct}`;
    document.getElementById('ws-next').hidden=false;
  }

  function wsNext(){idx++;if(idx>=deck.length)showEnd();else showCard();}

  function showEnd(){
    document.getElementById('exercise').innerHTML=`
      <div class="kaart ws-score-end">
        <p class="kaart-titel">Klaar!</p>
        <p class="score-display">Score: <strong>${score} van ${deck.length}</strong></p>
        <button type="button" class="submit-btn" onclick="startFlash()" style="margin-top:12px">↺ Opnieuw oefenen</button>
      </div>`;
  }

  function startKoppel(){kRound=shuffle(getWords()).slice(0,6);kSelFr=null;kMatched=0;renderKoppel();}

  function renderKoppel(){
    const fr=shuffle([...Array(kRound.length).keys()]);
    const nl=shuffle([...Array(kRound.length).keys()]);
    let fH='',nH='';
    fr.forEach(i=>{fH+=`<button type="button" class="koppel-btn" id="kfr${i}" onclick="clickFr(${i})">${kRound[i].f}</button>`;});
    nl.forEach(i=>{nH+=`<button type="button" class="koppel-btn" id="knl${i}" onclick="clickNl(${i})">${kRound[i].n}</button>`;});
    document.getElementById('exercise').innerHTML=`
      <div class="kaart">
        <p class="kaart-titel">Koppelen</p>
        <p style="font-size:.85rem;color:#888;margin-bottom:4px">Klik een Frans woord, dan de juiste vertaling.</p>
        <div class="ws-koppel-grid"><div>${fH}</div><div>${nH}</div></div>
        <div id="kp-end" hidden style="text-align:center;margin-top:12px">
          <p class="score-display">Alle koppels gemaakt!</p>
          <button type="button" class="submit-btn" onclick="startKoppel()">Nieuwe ronde →</button>
        </div>
      </div>`;
  }

  function clickFr(i){
    const btn=document.getElementById('kfr'+i);
    if(btn.disabled||btn.classList.contains('matched'))return;
    document.querySelectorAll('.koppel-btn').forEach(b=>{if(!b.classList.contains('matched'))b.classList.remove('selected');});
    kSelFr=i;btn.classList.add('selected');
  }

  function clickNl(j){
    if(kSelFr===null)return;
    const fB=document.getElementById('kfr'+kSelFr);
    const nB=document.getElementById('knl'+j);
    if(nB.classList.contains('matched'))return;
    if(kSelFr===j){
      fB.classList.remove('selected');fB.classList.add('matched');fB.disabled=true;
      nB.classList.add('matched');nB.disabled=true;
      kMatched++;kSelFr=null;
      if(kMatched===kRound.length)document.getElementById('kp-end').hidden=false;
    } else {
      fB.classList.remove('selected');fB.classList.add('wrong-flash');nB.classList.add('wrong-flash');
      setTimeout(()=>{fB.classList.remove('wrong-flash');nB.classList.remove('wrong-flash');},600);
      kSelFr=null;
    }
  }

  function showLijst(){
    let html='<div class="kaart"><p class="kaart-titel">Woordenlijst</p><table class="lijst-table"><thead><tr><th>Frans</th><th>Nederlands</th></tr></thead><tbody>';
    if(themeIdx===-1){
      THEMES.forEach(t=>{
        html+=`<tr><td colspan="2" class="lijst-sectie">${t.name}</td></tr>`;
        t.words.forEach(w=>{html+=`<tr><td>${w.f}</td><td>${w.n}</td></tr>`;});
      });
    } else {
      THEMES[themeIdx].words.forEach(w=>{html+=`<tr><td>${w.f}</td><td>${w.n}</td></tr>`;});
    }
    html+='</tbody></table></div>';
    document.getElementById('exercise').innerHTML=html;
  }
  </script>

</body>
</html>
