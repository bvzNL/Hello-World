<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP Admin</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>RSVP overzicht</h1>
      <p>Vul je admin token in om de reacties op te halen.</p>
      <form id="adminForm">
        <label>
          Admin token
          <input type="password" name="token" required />
        </label>
        <div class="admin-actions">
          <button class="btn" type="submit">Ophalen</button>
          <button class="btn ghost" id="resetBtn" type="button">Reset testdata</button>
        </div>
      </form>
      <p id="adminMessage" class="form-message"></p>
    </section>

    <section class="card" id="summaryCard" hidden>
      <h2>Samenvatting</h2>
      <div id="summary"></div>
    </section>

    <section class="card" id="tableCard" hidden>
      <h2>Aanmeldingen</h2>
      <div class="table-wrap">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Moment</th>
              <th>Naam</th>
              <th>Aanwezig</th>
              <th>Personen</th>
              <th>Contact</th>
              <th>Opmerking</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="/admin.js" defer></script>
</body>
</html>
